# This workflow will install Python dependencies,
# run tests and lint with a single version of Python
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Run nightly at 12am UTC
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install dependencies
        run: uv sync --only-group lint --frozen

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uv run flake8 batconf tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          uv run flake8 batconf tests --count --exit-zero --statistics

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: [
          '3.10', '3.11', '3.12', '3.13', '3.14',
        ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install dependencies
        run: uv sync --only-group typecheck --frozen

      - name: Type checking with mypy
        run: |
          uv run mypy batconf
          uv run mypy tests

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: [
          '3.10', '3.11', '3.12', '3.13', '3.13t', '3.14', '3.14t',
          'pypy-3.10', 'pypy-3.11',
        ]
        install-opts: [ '', '[yaml]' ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        # Include extra tests for legacy toml package
        include:
          - python-version: '3.10'
            install-opts: '[toml]'
            os: 'ubuntu-latest'

          - python-version: '3.10'
            install-opts: '[toml]'
            os: 'macos-latest'

          - python-version: '3.10'
            install-opts: '[toml]'
            os: 'windows-latest'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install dependencies
        run: uv sync --only-group test --frozen --no-install-project

      - name: Unit Tests
        run: |
          uv run pytest batconf

      - name: Install the module
        run: |
          uv pip install .${{ matrix.install-opts }}

      - name: Integration Tests
        run: |
          uv run pytest --no-cov tests

  all-checks:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
