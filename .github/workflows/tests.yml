# Runs the Nox test matrix through Pixi so CI uses the exact same entrypoints
# as local development (`pixi run nox ...`). Nox installs each session frozen
# from uv.lock, so CI, the matrix, and the dev env never drift.
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Run nightly at 12am UTC
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [
          '3.10', '3.11', '3.12', '3.13', '3.13t', '3.14', '3.14t',
          'pypy3.10', 'pypy3.11',
        ]
        extras: ['', 'yaml']
        # tests_toml is 3.10-only (the [toml] extra only applies there); add it
        # once per OS instead of folding it into the python/extras product.
        include:
          - { os: ubuntu-latest,  session: tests_toml }
          - { os: macos-latest,   session: tests_toml }
          - { os: windows-latest, session: tests_toml }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659 # v0.8.1
        with:
          pixi-version: latest
          environments: default

      - name: Run nox session
        shell: bash
        run: |
          session="${{ matrix.session }}"
          if [ -z "$session" ]; then
            session="tests-${{ matrix.python }}(extras='${{ matrix.extras }}')"
          fi
          pixi run nox --session "$session"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        nox-session: [
          'typecheck-3.10', 'typecheck-3.11', 'typecheck-3.12',
          'typecheck-3.13', 'typecheck-3.14',
        ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659 # v0.8.1
        with:
          pixi-version: latest
          environments: default

      - run: pixi run nox --session "${{ matrix.nox-session }}"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@ba3bb36eb2066252b2363392b7739741bb777659 # v0.8.1
        with:
          pixi-version: latest
          environments: lint

      - run: pixi run lint

  all-checks:
    if: always()
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
