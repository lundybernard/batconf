# Runs the Nox test matrix through Pixi so CI uses the exact same entrypoints
# as local development (`pixi run nox ...`). batconf is a library: no
# dependency lockfile is committed, and every session resolves fresh under the
# exclude-newer cooldown in [tool.uv], so new upstream releases are tested
# within days. The tooling layer (python/nox/uv) stays pinned by pixi.lock.
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Run nightly at 12am UTC
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [
          '3.10', '3.11', '3.12', '3.13', '3.13t', '3.14', '3.14t',
          'pypy3.10', 'pypy3.11',
        ]
        extras: ['', 'yaml']
        # tests_toml is 3.10-only (the [toml] extra only applies there); add it
        # once per OS instead of folding it into the python/extras product.
        include:
          - { os: ubuntu-latest,  session: tests_toml }
          - { os: macos-latest,   session: tests_toml }
          - { os: windows-latest, session: tests_toml }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          environments: default

      - name: Run nox session
        shell: bash
        run: |
          session="${{ matrix.session }}"
          if [ -z "$session" ]; then
            session="tests-${{ matrix.python }}(extras='${{ matrix.extras }}')"
          fi
          pixi run nox --session "$session"

      # Archive the solved dependency set (uv.lock is generated, not
      # committed) so a red run can be diffed against a known-good solve.
      # Nightlies always upload; other events only when the job fails.
      - name: Archive resolved lockfile
        if: always() && (github.event_name == 'schedule' || failure())
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: resolved-lock-${{ matrix.os }}-${{ matrix.python || matrix.session }}-${{ matrix.extras }}
          path: uv.lock

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        nox-session: [
          'typecheck-3.10', 'typecheck-3.11', 'typecheck-3.12',
          'typecheck-3.13', 'typecheck-3.14',
        ]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          environments: default

      - run: pixi run nox --session "${{ matrix.nox-session }}"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: latest
          environments: lint

      - run: pixi run lint

  all-checks:
    if: always()
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
